<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css">
<style>
.char-card{background:#201F25;border-radius:18px;border:1px solid #48454e;box-shadow:0 4px 12px rgba(0,0,0,.3);overflow:hidden;position:relative;width:170px;}
.char-card.hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(0,0,0,.45);border-color:rgba(189,179,255,.45);}
.char-card.fusion{border-color:rgba(224,179,255,.4);}
.char-card.dismissed{opacity:0.85;border-color:#796677;}
.img-wrap{aspect-ratio:2/3;width:100%;overflow:hidden;}
.img-wrap > div{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.img-wrap .material-symbols-outlined{font-size:54px;color:rgba(255,255,255,.32);}
.img-default{background:linear-gradient(160deg,#3a2f5e,#7d6b9e 60%,#bdb3ff 110%);}
.img-dismissed{background:linear-gradient(160deg,#3a3438,#79667770 110%);}
.img-fusion{background:linear-gradient(160deg,#5a2d6e,#e0b3ff 130%);}
.info{padding:10px 12px 12px;}
.info h3{font-size:14px;font-weight:700;line-height:1.3;color:#e5e1e6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0;}
.info .stars{margin-top:5px;display:flex;gap:1px;}
.info .stars span{font-size:14px;font-variation-settings:'FILL' 1;}
.au-badge{position:absolute;top:8px;right:8px;background:rgba(10,79,58,.85);border:1px solid #64DCB4;color:#64DCB4;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.au-badge .material-symbols-outlined{font-size:14px;}
.au-dots{position:absolute;top:8px;right:8px;display:flex;gap:3px;}
.au-dots span{width:8px;height:8px;border-radius:50%;border:1px solid rgba(255,255,255,.2);display:inline-block;}
.fusion .info h3, .dismissed .info h3{font-family:'Metamorphous',serif;}
.state-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#8a8693;text-align:center;margin-top:6px;font-family:ui-monospace,monospace;}
</style></head><body>
<div class="col" style="gap:10px;">
  <div class="eyebrow">Character card · 2:3 portrait · 18px radius</div>
  <div class="row" style="gap:14px;align-items:flex-start;">

    <div class="col" style="gap:0;">
      <div class="char-card">
        <div class="img-wrap"><div class="img-default"><span class="material-symbols-outlined">person</span></div></div>
        <div class="info"><h3>Aria of Ember</h3><div class="stars">
          <span class="material-symbols-outlined" style="color:#fbbf24;">star</span>
          <span class="material-symbols-outlined" style="color:#fbbf24;">star</span>
          <span class="material-symbols-outlined" style="color:#fbbf24;">star</span>
        </div></div>
      </div>
      <div class="state-label">Default</div>
    </div>

    <div class="col" style="gap:0;">
      <div class="char-card hover">
        <div class="img-wrap"><div class="img-default"><span class="material-symbols-outlined">person</span></div></div>
        <div class="info"><h3>Kael Vance</h3><div class="stars">
          <span class="material-symbols-outlined" style="color:#fb923c;">star</span>
        </div></div>
      </div>
      <div class="state-label">Hover</div>
    </div>

    <div class="col" style="gap:0;">
      <div class="char-card fusion">
        <div class="au-badge"><span class="material-symbols-outlined">wb_sunny</span></div>
        <div class="img-wrap"><div class="img-fusion"><span class="material-symbols-outlined">merge</span></div></div>
        <div class="info"><h3>Aria × Kael</h3><div class="stars">
          <span class="material-symbols-outlined" style="color:#e879f9;">star</span>
          <span class="material-symbols-outlined" style="color:#e879f9;">star</span>
          <span class="material-symbols-outlined" style="color:#e879f9;">star</span>
          <span class="material-symbols-outlined" style="color:#e879f9;">star</span>
        </div></div>
      </div>
      <div class="state-label">Fusion + AU</div>
    </div>

    <div class="col" style="gap:0;">
      <div class="char-card dismissed">
        <div class="img-wrap"><div class="img-dismissed"><span class="material-symbols-outlined">badge</span></div></div>
        <div class="info"><h3>Old Aldwin</h3><div class="stars">
          <span class="material-symbols-outlined" style="color:#94a3b8;font-variation-settings:'FILL' 1;">badge</span>
        </div></div>
      </div>
      <div class="state-label">Retired</div>
    </div>

  </div>
</div></body></html>
