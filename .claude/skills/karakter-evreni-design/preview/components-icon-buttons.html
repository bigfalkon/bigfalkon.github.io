<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css">
<style>
.cell{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;min-width:80px;}
.iconbtn{display:flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:50%;background:transparent;color:#c8c4d0;cursor:pointer;border:none;}
.iconbtn .material-symbols-outlined{font-size:22px;}
.iconbtn.hover{background:rgba(189,179,255,.10);color:#BDB3FF;}
.iconbtn.surface{background:#2A2830;border:1px solid #48454e;}
.iconbtn.au{border:1px solid rgba(100,220,180,.5);background:rgba(100,220,180,.08);color:#64DCB4;}
.iconbtn.au.active{background:#64DCB4;color:#0a2e22;box-shadow:0 0 0 2px #64DCB4;border-color:#64DCB4;}
.state-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#8a8693;font-family:ui-monospace,monospace;}
</style></head><body>
<div class="col" style="gap:14px;">
  <div class="row" style="justify-content:space-between;align-items:baseline;">
    <div class="eyebrow">Icon buttons · 44px round</div>
    <div class="value-label">22px Material glyph · rest → primary-tinted on hover</div>
  </div>
  <div class="row" style="gap:6px;justify-content:flex-start;">
    <div class="cell">
      <button class="iconbtn"><span class="material-symbols-outlined">close</span></button>
      <div class="state-label">Rest</div>
    </div>
    <div class="cell">
      <button class="iconbtn hover"><span class="material-symbols-outlined">close</span></button>
      <div class="state-label">Hover</div>
    </div>
    <div class="cell">
      <button class="iconbtn surface"><span class="material-symbols-outlined">tune</span></button>
      <div class="state-label">Surface</div>
    </div>
    <div class="cell">
      <button class="iconbtn au"><span class="material-symbols-outlined">auto_fix_high</span></button>
      <div class="state-label">AU</div>
    </div>
    <div class="cell">
      <button class="iconbtn au active"><span class="material-symbols-outlined">auto_fix_high</span></button>
      <div class="state-label">AU active</div>
    </div>
    <div class="cell">
      <button class="iconbtn" style="opacity:0.35;cursor:not-allowed;"><span class="material-symbols-outlined">arrow_back</span></button>
      <div class="state-label">Disabled</div>
    </div>
  </div>
</div></body></html>
