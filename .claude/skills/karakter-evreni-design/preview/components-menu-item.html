<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css">
<style>
.menu{background:#2A2830;border:1px solid #48454e;border-radius:14px;padding:8px;width:240px;}
.mi{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;color:#e5e1e6;}
.mi:hover, .mi.hover{background:rgba(255,255,255,.08);}
.mi.active .check{visibility:visible;}
.mi .check{visibility:hidden;color:#BDB3FF;}
.mi .lhs{display:flex;align-items:center;gap:12px;}
.mi .material-symbols-outlined{font-size:20px;}
hr.div{border:none;border-top:1px solid #48454e;margin:6px 0;}
.miau{display:flex;gap:8px;align-items:center;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;}
.miau.active{background:rgba(100,220,180,.15);color:#64DCB4;}
.miau .dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(255,255,255,.2);}
</style></head><body>
<div class="col" style="gap:10px;">
  <div class="eyebrow">Dropdown menu · filter + AU</div>
  <div class="row" style="gap:14px;align-items:flex-start;">
    <div class="menu">
      <div class="mi active"><div class="lhs"><span class="material-symbols-outlined">apps</span><span>All</span></div><span class="material-symbols-outlined check">check</span></div>
      <div class="mi"><div class="lhs"><span class="material-symbols-outlined" style="color:#fb923c;">filter_1</span><span>1 Star</span></div><span class="material-symbols-outlined check">check</span></div>
      <div class="mi hover"><div class="lhs"><span class="material-symbols-outlined" style="color:#fbbf24;">filter_3</span><span>3 Star</span></div><span class="material-symbols-outlined check">check</span></div>
      <hr class="div">
      <div style="padding:4px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#c8c4d0;">Sort</div>
      <div class="mi"><div class="lhs"><span class="material-symbols-outlined">sort_by_alpha</span><span>Name (A–Z)</span></div></div>
    </div>
    <div class="menu" style="width:200px;">
      <div class="miau"><div class="dot" style="background:transparent;"></div><span>None</span></div>
      <div class="miau active"><div class="dot" style="background:#64DCB4;"></div><span class="material-symbols-outlined" style="font-size:16px;color:#64DCB4;">auto_fix_high</span><span>Solaris</span></div>
      <div class="miau"><div class="dot" style="background:#BDB3FF;"></div><span class="material-symbols-outlined" style="font-size:16px;color:#BDB3FF;">dark_mode</span><span>Eclipse</span></div>
    </div>
  </div>
</div></body></html>
