<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css">
<style>
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:99px;font-weight:700;border:1px solid transparent;cursor:pointer;font-family:inherit;font-size:14px;}
.btn-primary{background:#BDB3FF;color:#2D235C;}
.btn-secondary{background:#2A2830;color:#c8c4d0;border-color:#48454e;}
.btn-danger{background:#EF5350;color:#fff;}
.btn-au{background:rgba(100,220,180,.15);color:#64DCB4;border-color:rgba(100,220,180,.4);}
.btn-ghost{background:transparent;color:#BDB3FF;border-color:rgba(189,179,255,.35);}
.btn .material-symbols-outlined{font-size:18px;}
</style></head><body>
<div class="col" style="gap:10px;">
  <div class="eyebrow">Buttons · pill, 99px radius</div>
  <div class="row" style="gap:10px;flex-wrap:wrap;">
    <button class="btn btn-primary"><span class="material-symbols-outlined">sports_esports</span>Start Tournament</button>
    <button class="btn btn-secondary"><span class="material-symbols-outlined">arrow_back</span>Back</button>
    <button class="btn btn-au"><span class="material-symbols-outlined">auto_fix_high</span>AU Mode</button>
  </div>
  <div class="row" style="gap:10px;flex-wrap:wrap;">
    <button class="btn btn-danger"><span class="material-symbols-outlined">delete_forever</span>Reset All</button>
    <button class="btn btn-ghost"><span class="material-symbols-outlined">clear_all</span>Clear</button>
    <button class="btn btn-primary" style="opacity:0.45;cursor:not-allowed;">Disabled</button>
  </div>
</div></body></html>
