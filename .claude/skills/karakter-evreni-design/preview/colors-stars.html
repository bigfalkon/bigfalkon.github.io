<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css">
<style>
  .star-cell { display:flex; flex-direction:column; gap:6px; flex:1; background:#201F25; border:1px solid #48454e; border-radius:14px; padding:14px 12px; align-items:center; }
  .star-row { display:flex; gap:2px; }
  .star-row .material-symbols-outlined { font-size:22px; font-variation-settings: 'FILL' 1; }
  .star-cell .tier { font-weight:700; font-size:13px; }
</style></head><body>
<div class="col" style="gap:12px;">
  <div class="eyebrow">Star tier colors · card filters</div>
  <div class="row" style="gap:10px;">

    <div class="star-cell">
      <div class="star-row">
        <span class="material-symbols-outlined" style="color:#fb923c;">star</span>
      </div>
      <div class="tier" style="color:#fb923c;">1★</div>
      <div class="value-label">#fb923c · orange-400</div>
    </div>

    <div class="star-cell">
      <div class="star-row">
        <span class="material-symbols-outlined" style="color:#94a3b8;">star</span>
        <span class="material-symbols-outlined" style="color:#94a3b8;">star</span>
      </div>
      <div class="tier" style="color:#94a3b8;">2★</div>
      <div class="value-label">#94a3b8 · slate-400</div>
    </div>

    <div class="star-cell">
      <div class="star-row">
        <span class="material-symbols-outlined" style="color:#fbbf24;">star</span>
        <span class="material-symbols-outlined" style="color:#fbbf24;">star</span>
        <span class="material-symbols-outlined" style="color:#fbbf24;">star</span>
      </div>
      <div class="tier" style="color:#fbbf24;">3★</div>
      <div class="value-label">#fbbf24 · amber-400</div>
    </div>

    <div class="star-cell">
      <div class="star-row">
        <span class="material-symbols-outlined" style="color:#e879f9;">star</span>
        <span class="material-symbols-outlined" style="color:#e879f9;">star</span>
        <span class="material-symbols-outlined" style="color:#e879f9;">star</span>
        <span class="material-symbols-outlined" style="color:#e879f9;">star</span>
      </div>
      <div class="tier" style="color:#e879f9;">4★ / Fusion</div>
      <div class="value-label">#e879f9 · fuchsia-400</div>
    </div>

  </div>
</div></body></html>
